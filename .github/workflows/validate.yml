name: Validate skills

on:
  push:
    branches: [master]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Validate skill packages
        run: python3 scripts/validate_skills.py
      - name: Validate inventory freshness
        run: python3 scripts/build_inventory.py --check
      - name: Verify canonical flagship package locks
        run: python3 scripts/sync_flagship_skills.py check
      - name: Test flagship synchronization safety
        run: PYTHONDONTWRITEBYTECODE=1 python3 scripts/test_sync_flagship_skills.py -v
      - name: Test readiness scoring engine
        run: PYTHONDONTWRITEBYTECODE=1 python3 skills/agent-readiness-scoring/scripts/test_readiness.py -v
      - name: Test readiness behavioral evaluation harness
        run: PYTHONDONTWRITEBYTECODE=1 python3 skills/agent-readiness-scoring/scripts/test_agent_eval.py -v
      - name: Test onboarding doctor
        run: PYTHONDONTWRITEBYTECODE=1 python3 skills/setup-agent-skills/scripts/test_doctor.py -v
      - name: Test hardened Ralph runtime
        run: PYTHONDONTWRITEBYTECODE=1 python3 skills/ralph-workflows/scripts/test_ralph.py -v
      - name: Scan for secrets
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
